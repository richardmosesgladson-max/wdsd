<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wdsd - Study Hub</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background: #0f172a; 
      color: #f8fafc; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
      padding: 20px;
    }

    .container {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    h1 { font-size: 2rem; color: #38bdf8; margin-bottom: 8px; letter-spacing: 2px; }
    p { color: #94a3b8; margin-bottom: 20px; font-size: 0.95rem; }

    .status { 
      background: #334155; 
      color: #e2e8f0; 
      padding: 10px; 
      border-radius: 6px; 
      font-size: 0.85rem; 
      margin-bottom: 25px; 
    }

    .btn-group { display: flex; flex-direction: column; gap: 12px; }

    .download-btn {
      background: #0284c7;
      color: white;
      text-decoration: none;
      padding: 14px;
      border-radius: 8px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.2s;
    }

    .download-btn:hover { background: #0369a1; }
  </style>
</head>
<body>

  <div class="container">
    <h1>wdsd</h1>
    <p>Distraction-Free Offline Material Vault</p>

    <div id="status" class="status">Downloading materials to device...</div>

    <div class="btn-group">
      <a href="file1.pdf" download="file1.pdf" id="pdf1" class="download-btn">
        <span>📄 Ds </span> ⬇️
      </a>
      <a href="file2.pdf" download="file2.pdf" id="pdf2" class="download-btn">
        <span>📄 Daa </span> ⬇️
      </a>
      <a href="file3.pdf" download="file3.pdf" id="pdf3" class="download-btn">
        <span>📄 Download Material 3</span> ⬇️
      </a>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(() => {
          const statusElem = document.getElementById('status');
          if (statusElem) {
            statusElem.innerText = '⚡ Cached & Ready for Offline Use';
            statusElem.style.background = '#16a34a';
          }
        })
        .catch(err => console.error('ServiceWorker Error:', err));
    }

    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('pdf1')?.click();
        document.getElementById('pdf2')?.click();
        document.getElementById('pdf3')?.click();
      }, 1000);
    });
  </script>
</body>
</html>
